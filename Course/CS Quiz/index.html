<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CS Quiz App</title>
  <link rel="icon" href="https://raw.githubusercontent.com/Runarok/GenAI-plus/main/GenAI-plus.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>CS Quiz App</h1>

    <!-- Quiz Selection -->
    <div id="quiz-selection">
      <h2>Select a Quiz</h2>
      <div id="quiz-list"></div>
    </div>

    <!-- Mode Selection -->
    <div id="mode-selection" class="hidden">
      <h2 id="selected-quiz-title"></h2>
      <button onclick="startQuiz()">Take Quiz</button>
      <button onclick="showAnswers()">View Answers</button>
      <button onclick="goBack()">Back</button>
    </div>

    <!-- Quiz Area -->
    <div id="quiz-container" class="hidden"></div>

    <!-- Result -->
    <div id="result" class="hidden"></div>

  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
